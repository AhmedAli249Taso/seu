<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SEU Portal - Electronic Services</title>
    <link rel="stylesheet" href="seu.css">
</head>
<body class="login-mode">

    <div class="portal-container">
        <header class="brand-header">
            <div class="brand-logo-container">
                <img src="seu-logo.png.jpg" alt="SEU Logo" class="seu-real-logo">
            </div>
            <p class="brand-subtext">ini.ge</p>
        </header>

        <h1 class="portal-title">Electronic services system</h1>

        <main class="login-card">
            <form id="portalLoginForm" action="dashboard.html" method="GET">
                <div class="form-group">
                    <input type="email" id="userEmail" class="input-field" placeholder="Aadam2@seu.edu.ge" required>
                </div>
                <button type="submit" class="btn-submit">To be continued</button>
                <div class="form-options">
                    <a href="#" class="link-forgot">Forgot your data?</a>
                </div>
            </form>
        </main>

        <section class="lang-switcher-container">
            <button class="btn-lang" type="button">
                <img src="https://flagcdn.com/ge.svg" alt="Georgia Flag" class="flag-circle"> Georgia
            </button>
            <button class="btn-lang active" type="button">
                <img src="https://flagcdn.com/gb.svg" alt="UK Flag" class="flag-circle"> English
            </button>
        </section>

        <footer class="app-store-footer">
            <a href="#" class="badge-link">
                <img src="app-store.png.jpg" alt="Download on the App Store" class="store-badge-img">
            </a>
            <a href="#" class="badge-link">
                <img src="google-play.png.png" alt="Get it on Google Play" class="store-badge-img">
            </a>
        </footer>
    </div>

</body>
</html>
